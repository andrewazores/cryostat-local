name: cryostat-local
services:
  db:
    image: quay.io/cryostat/cryostat-db:latest
    restart: always
    hostname: db
    expose:
      - "5432"
    ports:
      - mode: ingress
        target: 5432
        published: "5432"
        protocol: tcp
    environment:
      PG_ENCRYPT_KEY: REPLACEME
      POSTGRESQL_DATABASE: cryostat
      POSTGRESQL_PASSWORD: cryostat
      POSTGRESQL_USER: cryostat
    volumes:
      - type: volume
        source: postgresql
        target: /var/lib/pgsql/data
        volume: {}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U cryostat -d cryostat || exit 1
      timeout: 5s
      interval: 10s
      retries: 3
      start_period: 10s
  s3:
    image: quay.io/cryostat/cryostat-storage:latest
    restart: always
    hostname: s3
    expose:
      - "8333"
    ports:
      - mode: ingress
        target: 8333
        published: "8333"
        protocol: tcp
      - mode: ingress
        target: 8888
        published: "8888"
        protocol: tcp
    environment:
      CRYOSTAT_ACCESS_KEY: access_key
      CRYOSTAT_BUCKETS: metadata,archivedrecordings,archivedreports,eventtemplates,probes,threaddumps,heapdumps
      CRYOSTAT_SECRET_KEY: secret_key
      DATA_DIR: /data
      IP_BIND: 0.0.0.0
      REST_ENCRYPTION_ENABLE: "1"
      WEED_V: "4"
    healthcheck:
      test:
        - CMD-SHELL
        - timeout
        - 5s
        - bash
        - -c
        - :> /dev/tcp/127.0.0.1/8333
      timeout: 5s
      interval: 10s
      retries: 3
      start_period: 30s
    volumes:
      - seaweed_data:/data

volumes:
  postgresql:
    driver: local
  seaweed_data:
    driver: local
